<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Future Echo</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<canvas id="bgCanvas"></canvas>

<div class="container">
    <h1>Future Echo</h1>
    <p class="subtitle">Conversation With Yourself — 10 Years Ahead</p>

    <div id="chatBox" class="chat-box"></div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="Ask your future self..." />
        <button onclick="sendMessage()">Send</button>
        <button onclick="voiceInput()">🎤</button>
    </div>

    <div class="controls">
        <button onclick="generateReport()">10 Year Report</button>
        <button onclick="toggleDarkMode()">Shift Reality</button>
        <button onclick="activateScaryMode()">Reveal Dark Timeline</button>
        <button onclick="resetAll()">Reset</button>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
